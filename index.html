<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porn Master - Video Upload</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            text-align: center; 
            padding: 50px; 
            margin: 0;
        }
        h1 { 
            color: #ff9900; /* Dark theme with orange accent */
            font-size: 3em;
            margin-bottom: 5px;
        }
        p {
            color: #aaaaaa;
            margin-bottom: 30px;
        }
        .upload-container { 
            background-color: #1e1e1e; 
            padding: 40px; 
            border-radius: 10px; 
            display: inline-block; 
            box-shadow: 0px 0px 15px rgba(255, 153, 0, 0.2); 
        }
        input[type="file"] { 
            margin: 20px 0; 
            color: #ffffff;
        }
        button { 
            background-color: #ff9900; 
            color: #000; 
            border: none; 
            padding: 12px 25px; 
            font-size: 16px; 
            cursor: pointer; 
            border-radius: 5px; 
            font-weight: bold; 
            transition: 0.3s;
        }
        button:hover { 
            background-color: #e68a00; 
        }
        #preview-container { 
            margin-top: 40px; 
            display: none; 
        }
        video { 
            max-width: 80%; 
            border-radius: 10px; 
            border: 2px solid #ff9900; 
            background-color: #000;
        }
    </style>
</head>
<body>

    <h1>Porn Master</h1>
    <p>Upload and Preview Your Videos Here</p>

    <div class="upload-container">
        <input type="file" id="videoUpload" accept="video/mp4,video/x-m4v,video/*">
        <br>
        <button onclick="uploadVideo()">Upload Video</button>
    </div>

    <div id="preview-container">
        <h3>Video Preview:</h3>
        <video id="videoPreview" controls></video>
    </div>

    <script>
        const videoUpload = document.getElementById('videoUpload');
        const videoPreview = document.getElementById('videoPreview');
        const previewContainer = document.getElementById('preview-container');

        // Video eka select karapu gaman preview eka pennanna
        videoUpload.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const fileURL = URL.createObjectURL(file);
                videoPreview.src = fileURL;
                previewContainer.style.display = 'block';
            }520ceaf2-2bd3-48a9-9829-5b74d03d1f2a.mp4
        });

        // Upload button eka click karama wena de
        function uploadVideo() {
            const file = videoUpload.files[0];
            if (!file) {
                alert("Please select a video first!");
                return;
            }
            // Me alert eken pennanne file eka server ekata yawanna ready kiyala
            alert("Video '" + file.name + "' is ready!\n\n(Note: Aththatama upload karanna Backend api ekak set karanna ona.)");
            
            // Backend ekata data yawanna nam fetch API eka use karanna wenawa (e.g., fetch('/upload', { method: 'POST', body: formData }))
        }
    </script>
</body>
</html>
