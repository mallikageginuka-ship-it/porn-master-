!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Porn Master</title>
  <style>
    body { background: #000; color: #fff; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 0; }
    header { background: red; padding: 15px; font-size: 20px; font-weight: bold; }
    .container { padding: 20px; }
    #upload_widget { background: red; color: white; padding: 12px 25px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    video { width: 90%; max-width: 800px; border-radius: 10px; background: #111; margin-top: 20px; }
  </style>
  <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>
</head>
<body>
  <header> 🎬 Porn Master </header>
  
  <div class="container">
    <h2>Video Upload karanna</h2>
    <button id="upload_widget">Upload Video</button>

    <div id="video_player"></div>
  </div>

<script type="text/javascript">
var myWidget = cloudinary.createUploadWidget({
  cloudName: 'cogtkhvf', 
  uploadPreset: 'ml_default'}, // Cloudinary eke unsigned preset ekak hadanna
  (error, result) => { 
    if (!error && result && result.event === "success") { 
      console.log('Done! Public ID:', result.info.public_id);
      document.getElementById("video_player").innerHTML = `
        <h2>Uploaded Video</h2>
        <video controls playsinline>
          <source src="${result.info.secure_url}" type="video/mp4">
        </video>
      `;
    }
  }
)

document.getElementById("upload_widget").addEventListener("click", function(){
    myWidget.open();
  }, false);
</script>

</body>
</html>
